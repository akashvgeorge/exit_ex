

<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Eurovision Points Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #5c67f2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #4a54e1; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class='container'>
        <h2>Eurovision Points Predictor</h2>
        <form id='predictionForm'>
            <div class='form-group'>
                <label>Year</label>
                <input type='number' name='Year' value='2012' required>
            </div>
            <div class='form-group'>
                <label>Is Final? (1 = Yes, 0 = No)</label>
                <select name='Is.Final'>
                    <option value='1'>Yes</option>
                    <option value='0'>No</option>
                </select>
            </div>
            <div class='form-group'>
                <label>Song in English? (1 = Yes, 0 = No)</label>
                <select name='Song.In.English'>
                    <option value='1'>Yes</option>
                    <option value='0'>No</option>
                </select>
            </div>
            <div class='form-group'><label>Energy (0-1)</label><input type='number' step='0.01' name='energy' value='0.7' required></div>
            <div class='form-group'><label>Duration (Seconds)</label><input type='number' step='0.1' name='duration' value='180' required></div>
            <div class='form-group'><label>Acousticness (0-1)</label><input type='number' step='0.01' name='acousticness' value='0.1' required></div>
            <div class='form-group'><label>Danceability (0-1)</label><input type='number' step='0.01' name='danceability' value='0.6' required></div>
            <div class='form-group'><label>Tempo (BPM)</label><input type='number' step='0.1' name='tempo' value='120' required></div>
            <div class='form-group'><label>Speechiness (0-1)</label><input type='number' step='0.01' name='speechiness' value='0.05' required></div>
            <div class='form-group'><label>Liveness (0-1)</label><input type='number' step='0.01' name='liveness' value='0.15' required></div>
            <div class='form-group'><label>Loudness (dB)</label><input type='number' step='0.1' name='loudness' value='-6.0' required></div>
            <div class='form-group'><label>Valence (0-1)</label><input type='number' step='0.01' name='valence' value='0.5' required></div>
            <button type='submit'>Predict Points</button>
        </form>
        <div id='result'></div>
    </div>

    <script>
        document.getElementById('predictionForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Convert numeric values
            for (let key in data) {
                data[key] = parseFloat(data[key]);
            }

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const resultDiv = document.getElementById('result');
            if (response.ok) {
                const res = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.style.backgroundColor = '#d4edda';
                resultDiv.innerText = `Predicted Points: ${res.prediction.toFixed(2)}`;
            } else {
                resultDiv.style.display = 'block';
                resultDiv.style.backgroundColor = '#f8d7da';
                resultDiv.innerText = 'Error making prediction.';
            }
        };
    </script>
</body>
</html>
